<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعتمد لتجهيز الأفراح والمناسبات</title>
    <meta http-equiv="refresh" content="0; url=/ar">
    <link rel="canonical" href="https://www.almoatamad.net/ar">
    <script>
        try {
            var userLang = navigator.language || navigator.userLanguage;
            if (userLang && userLang.toLowerCase().indexOf('en') === 0) {
                window.location.replace("/en");
            } else {
                window.location.replace("/ar");
            }
        } catch (e) {
            window.location.replace("/ar");
        }
    </script>
</head>
<body>
    <p style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        جاري التحويل... <a href="/ar">اضغط هنا إذا لم يتم تحويلك تلقائياً</a>
    </p>
</body>
</html>
